<template id="tpl-architecture">
  <section class="arch-main" data-screen-label="03 architecture">
    <div class="arch-head" data-reveal>
      <div class="ttl">the architecture</div>
      <div class="sub">autonomous entity architecture (AEA)</div>
      <p class="intro">The minimum viable shape an AI system must contain to run itself — to keep improving without an operator, and without falling apart. Not a tool I use: a <span class="em">framework for understanding what AI actually is</span>. Read it in plain words on the left; turn the structure on the right and switch on a layer to go deeper.</p>
      <div class="arch-status">
        <span class="pill"><span class="v">v0.2</span></span>
        <span class="pill">39 versions</span>
        <span class="pill">spec unchanged</span>
        <span class="pill">20+ hrs sustained</span>
      </div>
      <div class="headline">5 axes · 10 seeds · 4 mechanics<br>4 ops · 3 rules · one system</div>
    </div>

    <!-- the AEA: plain-language text (left) + native-WebGL structure (right) -->
    <div class="aea-panel" data-reveal>
      <div class="aea-text">
        <h1 class="at-h1">what makes AI run itself</h1>
        <p class="at-lede">A model on its own is just <b>very good autocomplete</b> — it guesses the next word. No memory, no actions, no decisions. <span class="g">An "entity" is everything you wire around it</span> so it can remember, act, decide, and improve. This is the map of that wiring.</p>
        <p class="at-law">THE ONE IDEA — watch what it does, freeze the parts that repeat into code, shrink the cost to almost nothing. Make the hidden parts visible, then drive the waste toward zero.</p>
        <h2 class="at-h2">five questions that place any AI</h2>
        <div class="at-row"><b>PATH</b> — <span class="d">who decides the next step — you, or it?</span></div>
        <div class="at-row"><b>MULTIPLICITY</b> — <span class="d">one AI, or several working together?</span></div>
        <div class="at-row"><b>ABSTRACTION</b> — <span class="d">what can it reach beyond its own words — memory? tools? writing its own tools?</span></div>
        <div class="at-row"><b>pROMPTING</b> — <span class="d">how is it told what to do?</span></div>
        <div class="at-row"><b>aSYNC</b> — <span class="d">does it wait in lockstep, or run on its own clock?</span></div>
        <div class="at-mini">each question has levels, from "barely" to "fully on its own." The gold rung is the highest level actually proven — not just hoped for.</div>
        <h2 class="at-h2">ten parts it can't live without</h2>
        <div class="at-row"><span class="d">take any one away and the whole thing falls apart:</span></div>
        <div class="at-row">somewhere to run · a clear goal · turning repeated work into code · falling back to the model when something's new · building its own next version · knowing what it's made of · sensing when it's stuck · a way past the wall · lines it must never cross · a path to roll back</div>
        <h2 class="at-h2">what it's always doing</h2><div class="at-row"><b>build</b> the setup · <b>pass results along</b> · <b>watch itself</b> the whole time</div>
        <h2 class="at-h2">the loop you run around it</h2><div class="at-row"><b>design</b> it · <b>run it on a clock you can watch</b> · <b>ship</b> it · <b>learn</b> from it</div>
        <h2 class="at-h2">the three rules it lives by</h2><div class="at-row"><span class="d">let behaviour emerge, don't force it · always be able to roll back · always be able to see what it did</span></div>
        <div class="at-mini">tap any part of the structure to read it in plain words.</div>
      </div>
      <div class="aea-stage" id="aeaMount"></div>
    </div>

    <div class="cracks-head" data-reveal>open cracks <span class="ch-note">— the honest edges, and the direction I'm taking on each</span></div>
    <div class="cracks" data-reveal>
      <div class="crack">
        <div class="ckey">identity <span class="cstate">(open)</span></div>
        <div class="ctext">if an entity splits in two, which divergence still counts as the same entity?</div>
        <div class="csol"><span class="cs-k">direction</span> identity = continuity of the rollback chain and the boundary set, not of the weights. A fork stays "the same entity" while it can still restore to a shared ancestor and honors the same lines.</div>
      </div>
      <div class="crack">
        <div class="ckey">self-rewrite <span class="cstate">(deferred)</span></div>
        <div class="ctext">can the entity safely rewrite the very framework that describes it?</div>
        <div class="csol"><span class="cs-k">direction</span> only through the same freeze → falsify gate, against a frozen copy of the spec. It may propose a new framework, but the old one stays restorable until the new one survives.</div>
      </div>
      <div class="crack">
        <div class="ckey">the long run <span class="cstate">(untested)</span></div>
        <div class="ctext">which paths of growth stay viable over time?</div>
        <div class="csol"><span class="cs-k">direction</span> treat each growth path as a hypothesis scored by the innovation layer; keep only the paths that pass the coherence and observability filters across a watched window.</div>
      </div>
    </div>
  </section>
</template>
