<!doctype html><html lang="en"><head>
<meta charset="UTF-8">
<title>AEA · five lights in the ink (prototype)</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#05070E;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head><body>
<canvas id="c"></canvas>
<script>
/* PROTOTYPE — "five lights in the ink": the AEA shown as only its five proven rungs,
   feathered gold lights in the hero's ink medium, each at a height = how far up its
   axis the proof reached. Ghost-ladders behind each (full level range, proven lit).
   Reuses the hero's sprite/curl/ignition verbatim. Canvas2D, file://-safe. */
(function(){
  'use strict';
  const reduced = ()=> window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  const eOut=x=>1-Math.pow(1-x,3);
  const STILL = location.search.indexOf('still')>=0;   // render the settled frame at once (for capture)

  // the five axes — only the PROVEN rung matters for the headline; ladders carry the range
  const AX=[
    {name:'path',         sub:'who decides',   levels:[1,2,3,4,5],     proven:3, label:'branching'},
    {name:'multiplicity', sub:'how many',      levels:[1,2,3,4,5],     proven:4, label:'coordinated'},
    {name:'abstraction',  sub:'composes with', levels:[0,1,2,3,4,5],   proven:1, label:'+ memory'},
    {name:'prompting',    sub:'input built',   levels:[1,2,3,4,5,6,7], proven:5, label:'self-refine'},
    {name:'async',        sub:'time',          levels:[1,2,3,4,5],     proven:4, label:'independent'},
  ];

  // feathered ink sprites (hero technique) — particles read as fluid, not dots
  function sprite(r,g,b){ const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
    const grd=x.createRadialGradient(64,64,0,64,64,64);
    grd.addColorStop(0,'rgba('+r+','+g+','+b+',0.82)');
    grd.addColorStop(0.22,'rgba('+r+','+g+','+b+',0.30)');
    grd.addColorStop(0.55,'rgba('+r+','+g+','+b+',0.06)');
    grd.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
    x.fillStyle=grd; x.fillRect(0,0,128,128); return c; }
  const INKB=sprite(150,184,242), INKG=sprite(233,184,96);

  // divergence-free CURL field (what makes ink bloom + swirl) — half the hero's amplitude
  const sn=(x,y,t)=> Math.sin(x*1.3+t)+Math.cos(y*1.7-t*0.8)+Math.sin((x+y)*0.9+t*0.6);
  const curl=(x,y,t)=>{ const e=0.15; return [ sn(x,y+e,t)-sn(x,y-e,t), -(sn(x+e,y,t)-sn(x-e,y,t)) ]; };

  let W,H,DPR,dye=[],lights=[],cx,cy,born=0,t0=performance.now(),mx=-999,my=-999,mAct=0,mvT=0;
  const TOP=0.16, SPAN=0.66;                         // vertical band the ladders live in
  const xOf=i=> (0.13 + 0.74*i/(AX.length-1))*W;     // five columns, inset from the edges
  const yOf=(n,max)=> (TOP + SPAN*(1 - n/max))*H;     // level → height (higher level = higher up)

  function build(){
    W=Math.max(800,innerWidth); H=Math.max(500,innerHeight); DPR=Math.min(2,devicePixelRatio||1);
    cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    lights=AX.map((a,i)=>{ const max=Math.max.apply(null,a.levels);
      const x=xOf(i), y=yOf(a.proven,max);
      return { a, max, x0:x, y0:y, x, y, vx:0, vy:0, ph:Math.random()*6.283,
        ticks:a.levels.map(n=>({n, y:yOf(n,max), lit:n===a.proven})) }; });
    cx=lights.reduce((s,l)=>s+l.x0,0)/lights.length;
    cy=lights.reduce((s,l)=>s+l.y0,0)/lights.length;
    // the ink medium — a calm body of blue-white dye, thinned at the empty centre
    const N=reduced()?120:200; dye=[];
    for(let i=0;i<N;i++){ const x=Math.random()*W, y=(TOP-0.06+ (SPAN+0.16)*Math.random())*H;
      dye.push({ hx:x, hy:y, x, y, vx:0, vy:0, sz:14+Math.random()*40, a:0.4+Math.random()*0.5, z:0.35+Math.random()*0.65 }); }
    if(!born) born = STILL ? performance.now()-6000 : performance.now();   // STILL → appear/ignition already at 1
  }
  build(); addEventListener('resize', build);
  addEventListener('pointermove', e=>{ const r=cv.getBoundingClientRect(); mx=e.clientX-r.left; my=e.clientY-r.top; mAct=1; mvT=performance.now(); });
  addEventListener('pointerleave',()=>mAct=0);

  function frame(now){
    const t=now-t0; if(now-mvT>160) mAct*=0.95;
    const appear=Math.min(1,(now-born)/1600);
    const ig=Math.min(1,(now-born)/2400), ie=eOut(ig);
    const bloom=0.5+0.5*Math.sin(t*0.00032), FLOW=0.42, spring=0.014;

    // ink trail wash (smears motion like dye); solid clear under reduced motion
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle = reduced() ? '#05070E' : 'rgba(5,7,14,0.085)';
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';

    // inward-resolving ignition: a bloom from the empty centre, the proof condensing out
    if(ig<1 && !reduced()){
      const fr=eOut(Math.min(1,ig/0.6)), fa=(1-ig)*(1-ig), frad=Math.min(W,H)*(0.1+fr*0.7);
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,frad);
      g.addColorStop(0,'rgba(250,222,150,'+(0.30*fa)+')'); g.addColorStop(0.4,'rgba(233,184,96,'+(0.09*fa)+')'); g.addColorStop(1,'rgba(233,184,96,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,frad,0,6.283); ctx.fill();
    }

    // the ink body — calm drifting dye, motion-stretched into wisps
    for(const p of dye){
      const c1=curl(p.x*0.0030, p.y*0.0030, t*0.00015), c2=curl(p.x*0.0072+4, p.y*0.0072-3, t*0.00028);
      p.vx += (c1[0]+c2[0]*0.4)*FLOW + (p.hx-p.x)*spring*0.5;
      p.vy += (c1[1]+c2[1]*0.4)*FLOW + (p.hy-p.y)*spring*0.5;
      if(mAct>0.02){ const dx=p.x-mx,dy=p.y-my,dd=Math.hypot(dx,dy)||1,R=Math.min(W,H)*0.32;
        if(dd<R){ const f=mAct*(1-dd/R); p.vx+=dx/dd*f*2 - dy/dd*f*1.2; p.vy+=dy/dd*f*2 + dx/dd*f*1.2; } }
      p.vx*=0.9; p.vy*=0.9; p.x+=p.vx; p.y+=p.vy;
      const spd=Math.hypot(p.vx,p.vy), ang=Math.atan2(p.vy,p.vx), dep=0.7+0.4*p.z;
      const sz=p.sz*(0.7+bloom*0.4)*dep, st=1+Math.min(4, spd*0.7);
      ctx.globalAlpha=p.a*(0.07+0.04*bloom)*dep*appear;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ang); ctx.drawImage(INKB,-sz*st,-sz,sz*2*st,sz*2); ctx.restore();
    }
    ctx.globalAlpha=1;

    // ── linework (source-over, crisp) ──
    ctx.globalCompositeOperation='source-over';

    // ghost ladders — the full level range behind each light; only the proven rung is lit
    for(const L of lights){
      ctx.strokeStyle='rgba(94,118,160,'+(0.5*appear)+')'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(L.x0, yOf(L.max,L.max)); ctx.lineTo(L.x0, yOf(L.a.levels[0],L.max)); ctx.stroke();
      for(const tk of L.ticks){ if(tk.lit) continue;
        ctx.strokeStyle='rgba(94,118,160,'+(0.45*appear)+')'; ctx.beginPath();
        ctx.moveTo(L.x0-4, tk.y); ctx.lineTo(L.x0+4, tk.y); ctx.stroke(); }
    }

    // the entity's outline — thin gold ink-filaments binding the five lights into ONE figure
    ctx.save(); ctx.shadowBlur=6; ctx.shadowColor='rgba(233,184,96,0.45)';
    ctx.strokeStyle='rgba(233,184,96,'+(0.34*ie*appear)+')'; ctx.lineWidth=1.1;
    ctx.beginPath();
    lights.forEach((L,i)=>{ i?ctx.lineTo(L.x,L.y):ctx.moveTo(L.x,L.y); });
    ctx.stroke(); ctx.restore();

    // the empty centre — the model you cannot point at (a faint void + a quiet label)
    ctx.setLineDash([2,5]); ctx.strokeStyle='rgba(94,118,160,'+(0.3*appear)+')'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy,16,0,6.283); ctx.stroke(); ctx.setLineDash([]);
    ctx.font='8px "IBM Plex Mono",monospace'; ctx.textAlign='center'; ctx.fillStyle='rgba(94,118,160,'+(0.55*appear)+')';
    ctx.fillText('the model', cx, cy+30);

    // the five proven lights — feathered gold blooms, drifting micro-distances on the curl
    for(const L of lights){
      const c=curl(L.x*0.0032, L.y*0.0032, t*0.00015);
      L.vx += c[0]*FLOW*0.5 + (L.x0-L.x)*spring*1.6; L.vy += c[1]*FLOW*0.5 + (L.y0-L.y)*spring*1.6;
      L.vx*=0.9; L.vy*=0.9; L.x+=L.vx; L.y+=L.vy;
      const sz=20+bloom*7;
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.42*appear;
      ctx.drawImage(INKG, L.x-sz, L.y-sz, sz*2, sz*2);
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
      ctx.beginPath(); ctx.fillStyle='rgba(250,222,150,'+(0.95*appear)+')'; ctx.arc(L.x,L.y,2.4,0,6.283); ctx.fill();
    }

    // captions — axis name at the top of each ladder, proven read under each light
    const la=appear*Math.max(0,(ie-0.35)/0.65);
    ctx.font='9px "IBM Plex Mono",monospace'; ctx.textAlign='center';
    for(const L of lights){
      ctx.fillStyle='rgba(234,240,251,'+(0.7*la)+')'; ctx.fillText(L.a.name, L.x0, yOf(L.max,L.max)-16);
      ctx.fillStyle='rgba(94,118,160,'+(0.6*la)+')'; ctx.fillText(L.a.sub, L.x0, yOf(L.max,L.max)-4);
      ctx.fillStyle='rgba(240,198,116,'+(0.92*la)+')';
      ctx.fillText(L.a.label+'  ('+L.a.proven+' of '+L.max+')', L.x, L.y+22);
    }

    if(!reduced()) requestAnimationFrame(frame);
  }
  frame(performance.now());   // always paint one frame synchronously; frame() self-loops via rAF if not reduced
})();
</script>
</body></html>
